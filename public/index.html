<title>Brazilian Portuguese Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --card-front: #1a1a2e;
    --card-back: #16213e;
    --accent: #e94560;
    --text: #f0f0f0;
    --text-dim: #8892a4;
    --green: #2ecc71;
    --red: #e74c3c;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 20px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(15,52,96,0.1) 0%, transparent 50%);
    z-index: 0;
    animation: bgShift 20s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { transform: translate(0,0); }
    100% { transform: translate(3%,-3%); }
  }

  .app { position: relative; z-index: 1; width: 100%; max-width: 520px; padding: 20px; }

  .header { text-align: center; margin-bottom: 24px; }

  .header h1 {
    font-family: 'Dela Gothic One', cursive;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), #ff8a80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin: 12px 0;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.07); }
  .filter-btn.active { background: rgba(233,69,96,0.2); color: var(--accent); border-color: rgba(233,69,96,0.3); }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff8a80);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .stats span { display: flex; align-items: center; gap: 5px; }
  .stats .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.green { background: var(--green); }
  .dot.red { background: var(--red); }
  .dot.gray { background: var(--text-dim); }

  .card-container {
    perspective: 1200px;
    width: 100%;
    height: 300px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .card-front {
    background: linear-gradient(145deg, var(--card-front), #12122a);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .card-back {
    background: linear-gradient(145deg, var(--card-back), #0d1b30);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    transform: rotateY(180deg);
  }

  .card-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 700;
  }

  .card-word {
    font-family: 'Dela Gothic One', cursive;
    font-size: 1.4rem;
    line-height: 1.35;
    margin-bottom: 10px;
  }

  .card-hint {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.18);
    position: absolute;
    bottom: 16px;
  }

  .category-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .cat-vocab { background: rgba(52,152,219,0.15); color: #3498db; }

  .cat-ir-conj { background: rgba(255,152,0,0.15); color: #ff9800; }
  .cat-bday { background: rgba(255,64,129,0.15); color: #ff4081; }
  .cat-quase { background: rgba(121,85,72,0.15); color: #795548; }
  .cat-aula-mar27 { background: rgba(0,150,136,0.15); color: #009688; }
  .cat-ler-conj { background: rgba(103,58,183,0.15); color: #7c4dff; }
  .cat-esquecer-conj { background: rgba(233,30,99,0.15); color: #e91e63; }
  .cat-lembrar-conj { background: rgba(76,175,80,0.15); color: #4caf50; }

  .cat-april-fools { background: rgba(255,111,0,0.15); color: #ff6f00; }
  .cat-april2 { background: rgba(0,121,107,0.15); color: #00796b; }

  .buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 14px;
  }

  .btn {
    padding: 13px 30px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-wrong {
    background: rgba(231,76,60,0.12);
    color: var(--red);
    border: 1px solid rgba(231,76,60,0.2);
  }
  .btn-wrong:hover { background: rgba(231,76,60,0.2); }

  .btn-right {
    background: rgba(46,204,113,0.12);
    color: var(--green);
    border: 1px solid rgba(46,204,113,0.2);
  }
  .btn-right:hover { background: rgba(46,204,113,0.2); }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    padding: 9px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }

  .done-screen { text-align: center; padding: 40px 20px; }
  .done-screen h2 {
    font-family: 'Dela Gothic One', cursive;
    font-size: 1.8rem;
    margin-bottom: 14px;
    background: linear-gradient(135deg, var(--green), #a8e6cf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .done-screen p { color: var(--text-dim); margin-bottom: 20px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: slideIn 0.4s ease forwards; }

  .keyboard-hint {
    text-align: center;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.15);
    margin-top: 12px;
  }
</style>
</head>

  { pt: "Frase", en: "Sentence / phrase", cat: "april2" },
  { pt: "Graças a Deus é sexta", en: "Thank God it's Friday", cat: "april2" },
  { pt: "Sextou", en: "It's Friday! (slang)", cat: "april2" },
  { pt: "fds - final de semana", en: "Weekend", cat: "april2" },
  { pt: "Eu não tenho planos", en: "I don't have plans", cat: "april2" },
  { pt: "Descobrir", en: "To discover / find out", cat: "april2" },
  { pt: "Eu não sabia", en: "I didn't know", cat: "april2" },
  { pt: "Eu amo animais", en: "I love animals", cat: "april2" },
  { pt: "Fazenda", en: "Farm", cat: "april2" },
  { pt: "Aposentada", en: "Retired (f)", cat: "april2" },
  { pt: "No meio do nada", en: "In the middle of nowhere", cat: "april2" },
];

const catConfig = {
  fitness: { cls: "cat-fitness", label: "Fitness" },
  vocab: { cls: "cat-vocab", label: "Vocabulary" },
  phrases: { cls: "cat-phrases", label: "Phrases" },
  verbs: { cls: "cat-verbs", label: "Verbs" },
  weather: { cls: "cat-weather", label: "Weather" },
  daily: { cls: "cat-daily", label: "Daily Life" },
  time: { cls: "cat-time", label: "Time & Days" },
  "ir-phrases": { cls: "cat-ir-phrases", label: "IR Phrases" },
  "ir-conj": { cls: "cat-ir-conj", label: "IR Conjugations" },
  bday: { cls: "cat-bday", label: "Birthday" },
  quase: { cls: "cat-quase", label: "Quase" },
  "aula-mar27": { cls: "cat-aula-mar27", label: "Aula Mar 27" },
  "ler-conj": { cls: "cat-ler-conj", label: "Ler Conjugations" },
  "esquecer-conj": { cls: "cat-esquecer-conj", label: "Esquecer Conjugations" },
  "lembrar-conj": { cls: "cat-lembrar-conj", label: "Lembrar Conjugations" },
  "dizer-conj": { cls: "cat-dizer-conj", label: "Dizer Conjugations" },
  "aula-mar30": { cls: "cat-aula-mar30", label: "Aula Mar 30" },
  "april-fools": { cls: "cat-april-fools", label: "April Fools" },
  "april2": { cls: "cat-april2", label: "April 2" },
};

let activeCats = new Set(Object.keys(catConfig));
let deck = [];
let currentIndex = 0;
let isFlipped = false;
let correct = 0;
let wrong = 0;
let mode = "pt-to-en";
let wrongCards = [];

let statsCache = {};

function getCardId(card) {
  return card.pt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

async function fetchAllStats() {
  statsCache = await fetch("/api/stats").then(r => r.json());
}

function getCardStats(card) {
  return statsCache[getCardId(card)] || { right: 0, wrong: 0 };
}

async function resetStats() {
  await fetch("/api/stats", { method: "DELETE" });
  await fetch("/api/session", { method: "DELETE" });
  statsCache = {};
  startDeck();
}

function saveSession() {
  const deckOrder = deck.map(c => allCards.indexOf(c));
  const wc = wrongCards.map(c => allCards.indexOf(c));
  fetch("/api/session", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ deckOrder, currentIndex, correct, wrong, mode, activeCats: [...activeCats], wrongCards: wc })
  });
}

async function loadSession() {
  const s = await fetch("/api/session").then(r => r.json());
  if (!s) return false;
  deck = s.deckOrder.map(i => allCards[i]);
  currentIndex = s.currentIndex;
  correct = s.correct;
  wrong = s.wrong;
  mode = s.mode;
  activeCats = new Set(s.activeCats);
  wrongCards = (s.wrongCards || []).map(i => allCards[i]);
  return true;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startDeck() {
  deck = shuffle(allCards.filter(c => activeCats.has(c.cat)));
  currentIndex = 0;
  isFlipped = false;
  correct = 0;
  wrong = 0;
  wrongCards = [];
  saveSession();
  render();
}

function reviewWrongCards() {
  deck = shuffle(wrongCards);
  currentIndex = 0;
  isFlipped = false;
  correct = 0;
  wrong = 0;
  wrongCards = [];
  saveSession();
  render();
}

function toggleCat(cat) {
  if (activeCats.has(cat)) {
    if (activeCats.size > 1) activeCats.delete(cat);
  } else {
    activeCats.add(cat);
  }
  startDeck();
}

function render() {
  const app = document.getElementById("app");

  if (deck.length === 0) {
    app.innerHTML = `<div class="done-screen animate-in"><h2>No cards</h2><p>Select at least one category</p></div>`;
    return;
  }

  if (currentIndex >= deck.length) {
    const pct = Math.round((correct / deck.length) * 100);
    if (wrongCards.length > 0) {
      app.innerHTML = `
        <div class="done-screen animate-in">
          <h2>Round done!</h2>
          <p>You finished ${deck.length} cards</p>
          <div class="stats" style="margin-bottom:20px; font-size:1rem;">
            <span><span class="dot green"></span> ${correct} correct</span>
            <span><span class="dot red"></span> ${wrong} wrong</span>
          </div>
          <p style="font-size:0.95rem;">${wrongCards.length} card${wrongCards.length === 1 ? '' : 's'} to review</p>
          <button class="btn btn-wrong" onclick="reviewWrongCards()" style="margin:20px auto 0;">Review Wrong Cards</button>
        </div>`;
    } else {
      app.innerHTML = `
        <div class="done-screen animate-in">
          <h2>Parabéns! 🎉</h2>
          <p>You got all ${deck.length} cards right!</p>
          <div class="stats" style="margin-bottom:20px; font-size:1rem;">
            <span><span class="dot green"></span> ${correct} correct</span>
          </div>
          <p style="font-size:0.95rem;">100% accuracy</p>
          <button class="btn btn-right" onclick="startDeck()" style="margin:20px auto 0;">Study Again</button>
        </div>`;
    }
    return;
  }

  const card = deck[currentIndex];
  const front = mode === "pt-to-en" ? card.pt : card.en;
  const back = mode === "pt-to-en" ? card.en : card.pt;
  const frontLabel = mode === "pt-to-en" ? "Português" : "English";
  const backLabel = mode === "pt-to-en" ? "English" : "Português";
  const pct = (currentIndex / deck.length) * 100;
  const cc = catConfig[card.cat];
  const cs = getCardStats(card);
  const cardStatsHTML = (cs.right || cs.wrong) ? `<div style="font-size:0.7rem;color:var(--text-dim);margin-top:8px">${cs.right}&#10003; ${cs.wrong}&#10007;</div>` : '';

  let filterHTML = Object.entries(catConfig).map(([key, val]) => {
    const count = allCards.filter(c => c.cat === key).length;
    return `<button class="filter-btn ${activeCats.has(key) ? 'active' : ''}" onclick="toggleCat('${key}')">${val.label} (${count})</button>`;
  }).join('');

  app.innerHTML = `
    <div class="header">
      <h1>🇧🇷 Português Flashcards</h1>
      <div class="filter-row">${filterHTML}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="stats">
        <span><span class="dot green"></span> ${correct}</span>
        <span><span class="dot red"></span> ${wrong}</span>
        <span><span class="dot gray"></span> ${deck.length - currentIndex} left</span>
      </div>
    </div>

    <div class="card-container" onclick="flipCard()">
      <div class="card ${isFlipped ? 'flipped' : ''}" id="theCard">
        <div class="card-face card-front">
          <span class="category-tag ${cc.cls}">${cc.label}</span>
          <div class="card-label">${frontLabel}</div>
          <div class="card-word">${front}</div>
          ${cardStatsHTML}
          <div class="card-hint">tap to flip</div>
        </div>
        <div class="card-face card-back">
          <span class="category-tag ${cc.cls}">${cc.label}</span>
          <div class="card-label">${backLabel}</div>
          <div class="card-word">${back}</div>
          ${cardStatsHTML}
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-wrong" onclick="mark(false)">✗ Again</button>
      <button class="btn btn-right" onclick="mark(true)">✓ Got it</button>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="toggleMode()">${mode === "pt-to-en" ? "PT → EN" : "EN → PT"}</button>
      <button class="ctrl-btn" onclick="startDeck()">Shuffle</button>
      <button class="ctrl-btn" onclick="resetStats()">Reset Stats</button>
    </div>
    <div class="keyboard-hint">Space = flip · → = got it · ← = again</div>`;
}

function flipCard() {
  isFlipped = !isFlipped;
  const el = document.getElementById("theCard");
  if (el) el.classList.toggle("flipped", isFlipped);
}

async function mark(gotIt) {
  if (gotIt) correct++; else { wrong++; wrongCards.push(deck[currentIndex]); }
  const card = deck[currentIndex];
  const id = getCardId(card);
  const updated = await fetch(`/api/stats/${encodeURIComponent(id)}/mark`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ correct: gotIt })
  }).then(r => r.json());
  statsCache[id] = updated;
  currentIndex++;
  isFlipped = false;
  saveSession();
  render();
}

function toggleMode() {
  mode = mode === "pt-to-en" ? "en-to-pt" : "pt-to-en";
  isFlipped = false;
  saveSession();
  render();
}

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") { e.preventDefault(); flipCard(); }
  else if (e.code === "ArrowRight") mark(true);
  else if (e.code === "ArrowLeft") mark(false);
});

fetchAllStats().then(() => loadSession()).then(restored => {
  if (restored) render(); else startDeck();
});
</script>
</body>
</html>
