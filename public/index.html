<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Português Aula</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --card-front: #1a1a2e;
    --card-back: #16213e;
    --accent: #e94560;
    --text: #f0f0f0;
    --text-dim: #8892a4;
    --green: #2ecc71;
    --red: #e74c3c;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(15,52,96,0.1) 0%, transparent 50%);
    z-index: 0;
    animation: bgShift 20s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { transform: translate(0,0); }
    100% { transform: translate(3%,-3%); }
  }

  .layout {
    position: relative;
    z-index: 1;
    display: flex;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .sidebar {
    width: 260px;
    min-width: 260px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.06);
    max-height: 100vh;
    position: sticky;
    top: 0;
  }

  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 10px;
  }

  .main-content {
    flex: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .card-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .mobile-cat-toggle {
    display: none;
    width: 100%;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    text-align: left;
    margin-bottom: 12px;
  }
  .mobile-cat-toggle:hover { background: rgba(255,255,255,0.07); }

  .selected-section { margin-bottom: 14px; }
  .selected-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 0 8px 6px;
  }
  .selected-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 0 4px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(233,69,96,0.3);
    background: rgba(233,69,96,0.15);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { background: rgba(233,69,96,0.25); }
  .chip .chip-x { font-size: 0.6rem; opacity: 0.6; }

  .cat-group { margin-bottom: 14px; }

  .cat-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    user-select: none;
  }
  .cat-group-header:hover { background: rgba(255,255,255,0.04); }

  .cat-group-header .chevron {
    transition: transform 0.2s;
    font-size: 0.6rem;
  }
  .cat-group-header.collapsed .chevron {
    transform: rotate(-90deg);
  }

  .cat-group-items {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 4px 0 0 0;
  }
  .cat-group-items.hidden { display: none; }

  .sidebar .filter-btn {
    width: 100%;
    text-align: left;
    padding: 6px 10px;
    font-size: 0.72rem;
  }

  .sidebar-controls {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }

  .sidebar-controls .ctrl-btn {
    width: 100%;
    text-align: center;
  }

  .mobile-cats {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .mobile-cats.open { display: flex; }

  .mobile-top-bar { display: none; }
  .mobile-cat-dropdown { display: none; }
  .bottom-sheet-backdrop { display: none; }
  .bottom-sheet { display: none; }

  .mobile-header { display: none; text-align: center; margin-bottom: 16px; }
  .mobile-header h1 {
    font-family: 'Dela Gothic One', cursive;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), #ff8a80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .layout {
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
    }
    .main-content {
      padding: 0;
      padding-bottom: 56px;
      max-width: 100% !important;
      margin: 0 !important;
      flex: 1;
      height: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .mobile-header { display: none; }
    .mobile-cat-toggle { display: none; }
    .mobile-cats { display: none !important; }

    /* Compact top bar */
    .mobile-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 8px;
      flex-shrink: 0;
    }
    .mobile-top-bar .stats {
      display: flex;
      gap: 12px;
      margin: 0;
      padding: 0;
      font-size: 0.78rem;
      justify-content: flex-start;
    }
    .mobile-cat-dropdown {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .mobile-cat-dropdown:hover { background: rgba(255,255,255,0.07); }

    /* Bottom sheet visible on mobile (offscreen via transform until .open) */
    .bottom-sheet { display: flex; }

    /* Thin progress bar */
    .progress-area {
      padding: 0 16px;
      margin-bottom: 0;
      flex-shrink: 0;
    }
    .progress-area .progress-bar { height: 2px; }
    .progress-area .stats { display: none; }

    /* Card fills remaining space */
    .card-area {
      flex: 1;
      height: 0;
      display: flex;
      flex-direction: column;
      justify-content: stretch;
      padding: 12px 16px;
      min-height: 0;
    }
    .card-container {
      flex: 1;
      height: 0;
      width: 100%;
      margin: 0 0 12px 0;
      position: relative;
    }
    .card {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .card-face { padding: 20px 16px; border-radius: 20px; }
    .card-word { font-size: 1.4rem; }
    .card-hint { display: none; }

    /* Fixed bottom buttons */
    .buttons {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 8px;
      margin: 0;
      padding: 8px 16px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .btn {
      flex: 1;
      justify-content: center;
      padding: 16px 0;
      border-radius: 12px;
      font-size: 1.05rem;
    }
    .btn-wrong {
      background: rgba(231,76,60,0.15);
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .btn-right {
      background: rgba(46,204,113,0.15);
    }
    .keyboard-hint { display: none; }
    .bottom-sheet-backdrop { display: none; }
    .bottom-sheet-backdrop.open { display: block; opacity: 1; }
    .bottom-sheet { display: flex; }
  }

  .header { text-align: center; margin-bottom: 24px; }

  .header h1 {
    font-family: 'Dela Gothic One', cursive;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), #ff8a80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.07); }
  .filter-btn.active { background: rgba(233,69,96,0.2); color: var(--accent); border-color: rgba(233,69,96,0.3); }

  .progress-area {
    width: 100%;
    flex-shrink: 0;
    margin-bottom: 10px;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff8a80);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 6px;
    padding-bottom: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .stats span { display: flex; align-items: center; gap: 5px; }
  .stats .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.green { background: var(--green); }
  .dot.red { background: var(--red); }
  .dot.gray { background: var(--text-dim); }

  .card-container {
    perspective: 1200px;
    width: 100%;
    height: 300px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .card-front {
    background: linear-gradient(145deg, var(--card-front), #12122a);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .card-back {
    background: linear-gradient(145deg, var(--card-back), #0d1b30);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    transform: rotateY(180deg);
  }

  .card-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 700;
  }

  .card-word {
    font-family: 'Dela Gothic One', cursive;
    font-size: 1.4rem;
    line-height: 1.35;
    margin-bottom: 10px;
  }

  .card-hint {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.18);
    position: absolute;
    bottom: 16px;
  }

  .category-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .cat-fitness { background: rgba(233,69,96,0.15); color: #e94560; }
  .cat-vocab { background: rgba(52,152,219,0.15); color: #3498db; }
  .cat-phrases { background: rgba(46,204,113,0.15); color: #2ecc71; }
  .cat-verbs { background: rgba(241,196,15,0.15); color: #f1c40f; }
  .cat-weather { background: rgba(155,89,182,0.15); color: #bb6bd9; }
  .cat-daily { background: rgba(230,126,34,0.15); color: #e67e22; }
  .cat-time { background: rgba(26,188,156,0.15); color: #1abc9c; }
  .cat-ir-phrases { background: rgba(0,188,212,0.15); color: #00bcd4; }
  .cat-ir-conj { background: rgba(255,152,0,0.15); color: #ff9800; }
  .cat-bday { background: rgba(255,64,129,0.15); color: #ff4081; }
  .cat-quase { background: rgba(121,85,72,0.15); color: #795548; }
  .cat-aula-mar27 { background: rgba(0,150,136,0.15); color: #009688; }
  .cat-ler-conj { background: rgba(103,58,183,0.15); color: #7c4dff; }
  .cat-esquecer-conj { background: rgba(233,30,99,0.15); color: #e91e63; }
  .cat-lembrar-conj { background: rgba(76,175,80,0.15); color: #4caf50; }
  .cat-dizer-conj { background: rgba(255,87,34,0.15); color: #ff5722; }
  .cat-aula-mar30 { background: rgba(63,81,181,0.15); color: #3f51b5; }
  .cat-april-fools { background: rgba(255,111,0,0.15); color: #ff6f00; }
  .cat-april2 { background: rgba(0,121,107,0.15); color: #00796b; }
  .cat-ser-conj { background: rgba(183,28,28,0.15); color: #ef5350; }
  .cat-estar-conj { background: rgba(156,39,176,0.15); color: #ce93d8; }
  .cat-esperar-conj { background: rgba(0,150,136,0.15); color: #80cbc4; }
  .cat-buscar-conj { background: rgba(121,85,72,0.15); color: #bcaaa4; }
  .cat-tomar-conj { background: rgba(255,193,7,0.15); color: #ffd54f; }
  .cat-fazer-conj { background: rgba(244,67,54,0.15); color: #ef9a9a; }
  .cat-trabalhar-conj { background: rgba(33,150,243,0.15); color: #90caf9; }

  .buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 14px;
  }

  .btn {
    padding: 13px 30px;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-wrong {
    background: rgba(231,76,60,0.12);
    color: var(--red);
    border: 1px solid rgba(231,76,60,0.2);
  }
  .btn-wrong:hover { background: rgba(231,76,60,0.2); }

  .btn-right {
    background: rgba(46,204,113,0.12);
    color: var(--green);
    border: 1px solid rgba(46,204,113,0.2);
  }
  .btn-right:hover { background: rgba(46,204,113,0.2); }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    padding: 9px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }

  .done-screen { text-align: center; padding: 40px 20px; }
  .done-screen h2 {
    font-family: 'Dela Gothic One', cursive;
    font-size: 1.8rem;
    margin-bottom: 14px;
    background: linear-gradient(135deg, var(--green), #a8e6cf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .done-screen p { color: var(--text-dim); margin-bottom: 20px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: slideIn 0.4s ease forwards; }

  .keyboard-hint {
    text-align: center;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.15);
    margin-top: 12px;
  }

/* Bottom Sheet */
.bottom-sheet-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.bottom-sheet-backdrop.open {
  display: block;
  opacity: 1;
}

.bottom-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 201;
  background: var(--card-front);
  border-radius: 16px 16px 0 0;
  max-height: 70vh;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
}
.bottom-sheet.open {
  transform: translateY(0);
}

.bottom-sheet-handle {
  display: flex;
  justify-content: center;
  padding: 10px 0 6px;
  cursor: grab;
}
.bottom-sheet-handle::after {
  content: '';
  width: 36px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
}

.bottom-sheet-title {
  padding: 4px 20px 12px;
  font-size: 0.95rem;
  font-weight: 700;
}

.bottom-sheet-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px;
  -webkit-overflow-scrolling: touch;
}

.bottom-sheet-body .cat-group { margin-bottom: 16px; }
.bottom-sheet-body .cat-group-header {
  font-size: 0.65rem;
  padding: 6px 0;
}
.bottom-sheet-body .cat-group-items {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  flex-direction: row;
  padding: 4px 0 0;
}
.bottom-sheet-body .filter-btn {
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 0.75rem;
  width: auto;
  text-align: center;
}

.bottom-sheet-controls {
  padding: 12px 20px 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.bottom-sheet-controls .ctrl-btn {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 12px;
  font-size: 0.78rem;
}
.gen-banner {
  background: var(--accent);
  color: #fff;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 500;
  gap: 12px;
  height: 37px;
  flex-shrink: 0;
  box-sizing: border-box;
}
.gen-banner span {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
body.gen-mode .layout {
  height: calc(100dvh - 37px);
  min-height: calc(100dvh - 37px);
}
.gen-banner button {
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
}
.gen-banner button:hover { background: rgba(255,255,255,0.3); }
.cat-generated { background: var(--accent); color: #fff; }
body.gen-mode .cat-group-items,
body.gen-mode .selected-section { opacity: 0.5; pointer-events: none; }
.ctrl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div id="app"></div>

<script>
let allCards = [];
let catConfig = {};

let activeCats = new Set();
let deck = [];
let currentIndex = 0;
let isFlipped = false;
let correct = 0;
let wrong = 0;
let mode = "pt-to-en";
let wrongCards = [];

let generatedMode = false;
let generatedCards = [];
let savedDeckSnapshot = null;
let isGenerating = false;

let statsCache = {};
let groupCollapseState = {};

function getCardId(card) {
  return card.pt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

async function fetchAllStats() {
  statsCache = await fetch("/api/stats").then(r => r.json());
}

function getCardStats(card) {
  return statsCache[getCardId(card)] || { right: 0, wrong: 0 };
}

function renderSelectedChips() {
  if (activeCats.size === 0) return '';
  const chips = [...activeCats].map(key => {
    const cc = catConfig[key];
    if (!cc) return '';
    return `<button class="chip" onclick="toggleCat('${key}')">${cc.label} <span class="chip-x">✕</span></button>`;
  }).join('');
  return `<div class="selected-section">
    <div class="selected-label">Selected</div>
    <div class="selected-chips">${chips}</div>
  </div>`;
}

function renderCatGroups(isMobile) {
  const groups = {};
  for (const [key, val] of Object.entries(catConfig)) {
    const group = val.group || 'Topics';
    if (!groups[group]) groups[group] = [];
    const count = allCards.filter(c => c.cat === key).length;
    groups[group].push({ key, label: val.label, count, active: activeCats.has(key) });
  }

  const selectedHTML = renderSelectedChips();
  const prefix = isMobile ? 'mob-' : 'side-';
  const groupsHTML = Object.entries(groups).map(([groupName, cats]) => {
    const stateKey = prefix + groupName;
    const collapsed = groupCollapseState[stateKey] !== false;
    const items = cats.map(c =>
      `<button class="filter-btn ${c.active ? 'active' : ''}" onclick="toggleCat('${c.key}')">${c.label} (${c.count})</button>`
    ).join('');
    return `
      <div class="cat-group">
        <div class="cat-group-header ${collapsed ? 'collapsed' : ''}" onclick="toggleGroup(this, '${stateKey}')">
          <span>${groupName}</span>
          <span class="chevron">&#9660;</span>
        </div>
        <div class="cat-group-items ${collapsed ? 'hidden' : ''}">${items}</div>
      </div>`;
  }).join('');

  return selectedHTML + groupsHTML;
}

function toggleGroup(header, stateKey) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('hidden');
  groupCollapseState[stateKey] = header.classList.contains('collapsed');
}

function openBottomSheet() {
  const backdrop = document.getElementById('sheetBackdrop');
  const sheet = document.getElementById('bottomSheet');
  if (!backdrop || !sheet) return;
  backdrop.classList.add('open');
  requestAnimationFrame(() => {
    sheet.classList.add('open');
  });
  document.body.style.overflow = 'hidden';
}

function closeBottomSheet() {
  const backdrop = document.getElementById('sheetBackdrop');
  const sheet = document.getElementById('bottomSheet');
  if (!backdrop || !sheet) return;
  sheet.classList.remove('open');
  backdrop.style.opacity = '0';
  setTimeout(() => {
    backdrop.classList.remove('open');
    backdrop.style.opacity = '';
    document.body.style.overflow = '';
  }, 300);
}

function setupSheetDrag() {
  const handle = document.getElementById('sheetHandle');
  const sheet = document.getElementById('bottomSheet');
  if (!handle || !sheet) return;

  let startY = 0;
  let currentY = 0;

  handle.addEventListener('touchstart', (e) => {
    startY = e.touches[0].clientY;
    sheet.style.transition = 'none';
  }, { passive: true });

  handle.addEventListener('touchmove', (e) => {
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if (diff > 0) {
      sheet.style.transform = `translateY(${diff}px)`;
    }
  }, { passive: true });

  handle.addEventListener('touchend', () => {
    sheet.style.transition = '';
    const diff = currentY - startY;
    if (diff > 80) {
      closeBottomSheet();
    } else {
      sheet.style.transform = '';
    }
    startY = 0;
    currentY = 0;
  });
}

function setupSwipeGestures() {
  const container = document.getElementById('cardContainer');
  if (!container) return;

  let startX = 0;
  let startY = 0;
  let swiping = false;

  container.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = false;
  }, { passive: true });

  container.addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 20) {
      swiping = true;
      e.preventDefault();
      const card = document.getElementById('theCard');
      if (card) {
        const rotation = dx * 0.05;
        const translateX = dx * 0.3;
        card.style.transition = 'none';
        card.style.transform = `translateX(${translateX}px) rotate(${rotation}deg)${isFlipped ? ' rotateY(180deg)' : ''}`;
      }
    }
  }, { passive: false });

  container.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - startX;
    const card = document.getElementById('theCard');

    if (swiping && Math.abs(dx) > 80) {
      if (card) {
        card.style.transition = 'transform 0.3s ease';
        card.style.transform = `translateX(${dx > 0 ? 300 : -300}px) rotate(${dx > 0 ? 15 : -15}deg)`;
      }
      setTimeout(() => {
        if (dx > 0) mark(true);
        else mark(false);
      }, 200);
    } else {
      if (card) {
        card.style.transition = '';
        card.style.transform = '';
      }
    }
    setTimeout(() => { swiping = false; }, 0);
  });

  container.addEventListener('click', (e) => {
    if (swiping) {
      e.stopPropagation();
      e.preventDefault();
    }
  }, true);
}

async function resetStats() {
  await fetch("/api/stats", { method: "DELETE" });
  await fetch("/api/session", { method: "DELETE" });
  statsCache = {};
  startDeck();
}

async function reseed() {
  await fetch("/api/reseed", { method: "POST" });
  statsCache = {};
  const data = await fetch("/api/cards").then(r => r.json());
  allCards = data.cards;
  catConfig = data.categories;
  activeCats = new Set();
  startDeck();
}

function saveSession() {
  if (generatedMode) return;
  const deckOrder = deck.map(c => c.pt);
  const wc = wrongCards.map(c => c.pt);
  fetch("/api/session", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ deckOrder, currentIndex, correct, wrong, mode, activeCats: [...activeCats], wrongCards: wc })
  });
}

async function loadSession() {
  const s = await fetch("/api/session").then(r => r.json());
  if (!s) return false;
  const cardMap = new Map(allCards.map(c => [c.pt, c]));
  deck = s.deckOrder.map(pt => cardMap.get(pt)).filter(Boolean);
  currentIndex = s.currentIndex;
  correct = s.correct;
  wrong = s.wrong;
  mode = s.mode;
  activeCats = new Set(s.activeCats);
  wrongCards = (s.wrongCards || []).map(pt => cardMap.get(pt)).filter(Boolean);
  if (deck.length === 0) return false;
  return true;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderKeepSheet() {
  const sheetWasOpen = document.getElementById('bottomSheet')?.classList.contains('open');
  render();
  if (sheetWasOpen) {
    const backdrop = document.getElementById('sheetBackdrop');
    const sheet = document.getElementById('bottomSheet');
    if (backdrop && sheet) {
      backdrop.classList.add('open');
      backdrop.style.transition = 'none';
      sheet.classList.add('open');
      sheet.style.transition = 'none';
      document.body.style.overflow = 'hidden';
      requestAnimationFrame(() => {
        backdrop.style.transition = '';
        sheet.style.transition = '';
      });
    }
  }
}

function startDeck() {
  deck = shuffle(allCards.filter(c => activeCats.has(c.cat)));
  currentIndex = 0;
  isFlipped = false;
  correct = 0;
  wrong = 0;
  wrongCards = [];
  saveSession();
  renderKeepSheet();
}

function shuffleRemaining() {
  const remaining = deck.slice(currentIndex);
  if (remaining.length === 0) { startDeck(); return; }
  const shuffled = shuffle(remaining);
  deck = [...deck.slice(0, currentIndex), ...shuffled];
  isFlipped = false;
  saveSession();
  renderKeepSheet();
}

function reviewWrongCards() {
  deck = shuffle(wrongCards);
  currentIndex = 0;
  isFlipped = false;
  correct = 0;
  wrong = 0;
  wrongCards = [];
  saveSession();
  render();
}

function toggleCat(cat) {
  if (generatedMode) return;
  if (activeCats.has(cat)) {
    activeCats.delete(cat);
    deck = deck.filter(c => c.cat !== cat);
    wrongCards = wrongCards.filter(c => c.cat !== cat);
    if (currentIndex > deck.length) currentIndex = deck.length;
  } else {
    activeCats.add(cat);
    const newCards = shuffle(allCards.filter(c => c.cat === cat));
    deck = [...deck.slice(0, currentIndex), ...deck.slice(currentIndex), ...newCards];
  }
  saveSession();
  renderKeepSheet();
}

function mobileDropdownLabel() {
  if (activeCats.size === 0 || activeCats.size === Object.keys(catConfig).length) return 'All Categories';
  if (activeCats.size === 1) {
    const key = [...activeCats][0];
    return catConfig[key]?.label || 'Categories';
  }
  return activeCats.size + ' selected';
}

function mobileTopBarHTML(correct, wrong, remaining) {
  return `<div class="mobile-top-bar">
    <div class="stats">
      <span><span class="dot green"></span> ${correct}</span>
      <span><span class="dot red"></span> ${wrong}</span>
      <span><span class="dot gray"></span> ${remaining} left</span>
    </div>
    <button class="mobile-cat-dropdown" onclick="openBottomSheet()">${mobileDropdownLabel()} ▾</button>
  </div>`;
}

function bottomSheetHTML() {
  return `<div class="bottom-sheet-backdrop" id="sheetBackdrop" onclick="closeBottomSheet()"></div>
  <div class="bottom-sheet" id="bottomSheet">
    <div class="bottom-sheet-handle" id="sheetHandle"></div>
    <div class="bottom-sheet-title">Categories</div>
    <div class="bottom-sheet-body" id="sheetBody">${renderCatGroups(true)}</div>
    <div class="bottom-sheet-controls">
      <button class="ctrl-btn" onclick="shuffleRemaining()">Shuffle</button>
      <button class="ctrl-btn" onclick="resetStats()">Reset Stats</button>
          <button class="ctrl-btn" onclick="reseed()">Reseed</button>
          <button class="ctrl-btn gen-btn" onclick="generateSentences()" ${isGenerating || generatedMode ? 'disabled' : ''}>${isGenerating ? '⏳ Generating…' : '✨ Generate'}</button>
      <button class="ctrl-btn" onclick="toggleMode()">${mode === "pt-to-en" ? "PT → EN" : "EN → PT"}</button>
    </div>
  </div>`;
}

function generatedBannerHTML() {
  if (!generatedMode) return '';
  return `<div class="gen-banner">
    <span>✨ Generated Mode · ${generatedCards.length} sentences</span>
    <button onclick="exitGeneratedMode()">Exit</button>
  </div>`;
}

function render() {
  const app = document.getElementById("app");

  if (deck.length === 0) {
    app.innerHTML = `${generatedBannerHTML()}<div class="layout"><div class="sidebar">
      <div class="sidebar-scroll"><div class="header"><h1>🇧🇷 Português Aula</h1></div>
      ${renderCatGroups(false)}</div>
    </div><div class="main-content">
      ${mobileTopBarHTML(0, 0, 0)}
      <div class="card-area"><div class="done-screen animate-in">
        <div style="font-size:3rem;margin-bottom:16px">🦜</div>
        <h2>Cadê as cartas?</h2>
        <p style="margin-top:8px">Pick some topics from the sidebar<br>and let's get studying!</p>
      </div></div>
    </div></div>${bottomSheetHTML()}`;
    setupSheetDrag();
    return;
  }

  if (currentIndex >= deck.length) {
    const pct = Math.round((correct / deck.length) * 100);
    if (wrongCards.length > 0) {
      app.innerHTML = `${generatedBannerHTML()}<div class="layout"><div class="sidebar">
        <div class="sidebar-scroll"><div class="header"><h1>🇧🇷 Português Aula</h1></div>
        ${renderCatGroups(false)}</div>
        <div class="sidebar-controls">
          <button class="ctrl-btn" onclick="toggleMode()">${mode === "pt-to-en" ? "PT → EN" : "EN → PT"}</button>
          <button class="ctrl-btn" onclick="shuffleRemaining()">Shuffle</button>
          <button class="ctrl-btn" onclick="resetStats()">Reset Stats</button>
          <button class="ctrl-btn" onclick="reseed()">Reseed</button>
          <button class="ctrl-btn gen-btn" onclick="generateSentences()" ${isGenerating || generatedMode ? 'disabled' : ''}>${isGenerating ? '⏳ Generating…' : '✨ Generate'}</button>
        </div>
      </div><div class="main-content">
        ${mobileTopBarHTML(correct, wrong, 0)}
        <div class="done-screen animate-in">
          <h2>Round done!</h2>
          <p>You finished ${deck.length} cards</p>
          <div class="stats" style="margin-bottom:20px; font-size:1rem;">
            <span><span class="dot green"></span> ${correct} correct</span>
            <span><span class="dot red"></span> ${wrong} wrong</span>
          </div>
          <p style="font-size:0.95rem;">${wrongCards.length} card${wrongCards.length === 1 ? '' : 's'} to review</p>
          <button class="btn btn-wrong" onclick="reviewWrongCards()" style="margin:20px auto 0;">Review Wrong Cards</button>
        </div>
      </div></div>${bottomSheetHTML()}`;
    } else {
      app.innerHTML = `${generatedBannerHTML()}<div class="layout"><div class="sidebar">
        <div class="sidebar-scroll"><div class="header"><h1>🇧🇷 Português Aula</h1></div>
        ${renderCatGroups(false)}</div>
        <div class="sidebar-controls">
          <button class="ctrl-btn" onclick="toggleMode()">${mode === "pt-to-en" ? "PT → EN" : "EN → PT"}</button>
          <button class="ctrl-btn" onclick="shuffleRemaining()">Shuffle</button>
          <button class="ctrl-btn" onclick="resetStats()">Reset Stats</button>
          <button class="ctrl-btn" onclick="reseed()">Reseed</button>
          <button class="ctrl-btn gen-btn" onclick="generateSentences()" ${isGenerating || generatedMode ? 'disabled' : ''}>${isGenerating ? '⏳ Generating…' : '✨ Generate'}</button>
        </div>
      </div><div class="main-content">
        ${mobileTopBarHTML(correct, 0, 0)}
        <div class="done-screen animate-in">
          <h2>Parabéns! 🎉</h2>
          <p>You got all ${deck.length} cards right!</p>
          <div class="stats" style="margin-bottom:20px; font-size:1rem;">
            <span><span class="dot green"></span> ${correct} correct</span>
          </div>
          <p style="font-size:0.95rem;">100% accuracy</p>
          <button class="btn btn-right" onclick="startDeck()" style="margin:20px auto 0;">Study Again</button>
        </div>
      </div></div>${bottomSheetHTML()}`;
    }
    setupSheetDrag();
    return;
  }

  const card = deck[currentIndex];
  const front = mode === "pt-to-en" ? card.pt : card.en;
  const back = mode === "pt-to-en" ? card.en : card.pt;
  const frontLabel = mode === "pt-to-en" ? "Português" : "English";
  const backLabel = mode === "pt-to-en" ? "English" : "Português";
  const pct = (currentIndex / deck.length) * 100;
  const cc = catConfig[card.cat] || { cls: 'cat-generated', label: '✨ Generated' };
  const cs = getCardStats(card);
  const cardStatsHTML = (cs.right || cs.wrong) ? `<div style="font-size:0.7rem;color:var(--text-dim);margin-top:8px">${cs.right}&#10003; ${cs.wrong}&#10007;</div>` : '';

  app.innerHTML = `${generatedBannerHTML()}
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-scroll">
          <div class="header">
            <h1>🇧🇷 Português Aula</h1>
          </div>
          ${renderCatGroups(false)}
        </div>
        <div class="sidebar-controls">
          <button class="ctrl-btn" onclick="toggleMode()">${mode === "pt-to-en" ? "PT → EN" : "EN → PT"}</button>
          <button class="ctrl-btn" onclick="shuffleRemaining()">Shuffle</button>
          <button class="ctrl-btn" onclick="resetStats()">Reset Stats</button>
          <button class="ctrl-btn" onclick="reseed()">Reseed</button>
          <button class="ctrl-btn gen-btn" onclick="generateSentences()" ${isGenerating || generatedMode ? 'disabled' : ''}>${isGenerating ? '⏳ Generating…' : '✨ Generate'}</button>
        </div>
      </div>

      <div class="main-content">
        ${mobileTopBarHTML(correct, wrong, deck.length - currentIndex)}

        <div class="progress-area">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="stats">
            <span><span class="dot green"></span> ${correct}</span>
            <span><span class="dot red"></span> ${wrong}</span>
            <span><span class="dot gray"></span> ${deck.length - currentIndex} left</span>
          </div>
        </div>

        <div class="card-area">
          <div class="card-container" id="cardContainer" onclick="flipCard()">
            <div class="card ${isFlipped ? 'flipped' : ''}" id="theCard">
              <div class="card-face card-front">
                <span class="category-tag ${cc.cls}">${cc.label}</span>
                <div class="card-label">${frontLabel}</div>
                <div class="card-word">${front}</div>
                ${cardStatsHTML}
              </div>
              <div class="card-face card-back">
                <span class="category-tag ${cc.cls}">${cc.label}</span>
                <div class="card-label">${backLabel}</div>
                <div class="card-word">${back}</div>
                ${cardStatsHTML}
              </div>
            </div>
          </div>

          <div class="buttons">
            <button class="btn btn-wrong" onclick="mark(false)">✗ Again</button>
            <button class="btn btn-right" onclick="mark(true)">✓ Got it</button>
          </div>
          <div class="keyboard-hint">Space/←/→ = flip · Enter = got it · Delete = again</div>
        </div>
      </div>
    </div>${bottomSheetHTML()}`;

  setupSwipeGestures();
  setupSheetDrag();
}

function flipCard() {
  isFlipped = !isFlipped;
  const el = document.getElementById("theCard");
  if (el) el.classList.toggle("flipped", isFlipped);
}

async function mark(gotIt) {
  if (gotIt) correct++; else { wrong++; wrongCards.push(deck[currentIndex]); }
  if (!generatedMode) {
    const card = deck[currentIndex];
    const id = getCardId(card);
    const updated = await fetch(`/api/stats/${encodeURIComponent(id)}/mark`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ correct: gotIt })
    }).then(r => r.json());
    statsCache[id] = updated;
  }
  currentIndex++;
  isFlipped = false;
  saveSession();
  render();
}

function toggleMode() {
  mode = mode === "pt-to-en" ? "en-to-pt" : "pt-to-en";
  isFlipped = false;
  saveSession();
  renderKeepSheet();
}

async function generateSentences() {
  if (isGenerating || generatedMode) return;
  if (activeCats.size === 0) {
    alert("Select at least one category first.");
    return;
  }
  isGenerating = true;
  render();
  try {
    const res = await fetch("/api/generate-sentences", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ activeCats: [...activeCats] })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || "Generation failed");
      return;
    }
    if (!data.cards || data.cards.length === 0) {
      alert("No sentences were generated. Try again.");
      return;
    }
    // Snapshot real deck state
    savedDeckSnapshot = {
      deck: deck.slice(),
      currentIndex,
      correct,
      wrong,
      wrongCards: wrongCards.slice()
    };
    // Swap to generated deck. Use "__generated__" as cat sentinel.
    generatedCards = data.cards.map(c => ({ pt: c.pt, en: c.en, cat: "__generated__" }));
    deck = generatedCards.slice();
    currentIndex = 0;
    correct = 0;
    wrong = 0;
    wrongCards = [];
    isFlipped = false;
    generatedMode = true;
    document.body.classList.add("gen-mode");
  } catch (err) {
    alert("Generation failed: " + err.message);
  } finally {
    isGenerating = false;
    render();
  }
}

function exitGeneratedMode() {
  if (!generatedMode || !savedDeckSnapshot) return;
  deck = savedDeckSnapshot.deck;
  currentIndex = savedDeckSnapshot.currentIndex;
  correct = savedDeckSnapshot.correct;
  wrong = savedDeckSnapshot.wrong;
  wrongCards = savedDeckSnapshot.wrongCards;
  generatedMode = false;
  document.body.classList.remove("gen-mode");
  generatedCards = [];
  savedDeckSnapshot = null;
  isFlipped = false;
  render();
}

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") { e.preventDefault(); flipCard(); }
  else if (e.code === "ArrowRight" || e.code === "ArrowLeft") { e.preventDefault(); flipCard(); }
  else if (e.code === "Enter") mark(true);
  else if (e.code === "Backspace" || e.code === "Delete") { e.preventDefault(); mark(false); }
});

async function boot() {
  const data = await fetch("/api/cards").then(r => r.json());
  allCards = data.cards;
  catConfig = data.categories;
  activeCats = new Set(Object.keys(catConfig).filter(id => catConfig[id].group !== "Topics"));
  await fetchAllStats();
  const restored = await loadSession();
  if (restored) render(); else startDeck();
}

boot();
</script>
</body>
